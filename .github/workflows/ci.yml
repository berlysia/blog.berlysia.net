name: Node CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  NODE_VERSION: 18

concurrency:
  group: vrt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # vrt:
  #   runs-on: ubuntu-latest
